<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ytapis &ndash; Video Info</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f0f0f; color: #eee; min-height: 100vh;
  }
  .container { max-width: 780px; margin: 0 auto; padding: 24px 16px; }

  header { text-align: center; margin-bottom: 32px; }
  header h1 {
    font-size: 2rem; font-weight: 700; letter-spacing: -0.02em;
    background: linear-gradient(135deg, #ff4d4d, #f9f9f9);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  header p { color: #888; margin-top: 4px; font-size: 0.9rem; }

  .input-box { display: flex; gap: 8px; }
  .input-box input {
    flex: 1; padding: 12px 16px; border: 1px solid #333; border-radius: 24px;
    background: #1a1a1a; color: #eee; font-size: 1rem; outline: none;
    transition: border .2s;
  }
  .input-box input:focus { border-color: #ff4d4d; }
  .input-box button {
    padding: 12px 24px; border: none; border-radius: 24px;
    background: #ff4d4d; color: #fff; font-size: 1rem; font-weight: 600;
    cursor: pointer; transition: background .2s;
  }
  .input-box button:hover { background: #e04040; }
  .input-box button:disabled { opacity: .6; cursor: not-allowed; }

  .error-msg { color: #ff4d4d; font-size: 0.85rem; margin-top: 8px; text-align: center; }

  .spinner {
    display: none; justify-content: center; padding: 48px 0;
  }
  .spinner.show { display: flex; }
  .spinner::after {
    content: ''; width: 36px; height: 36px;
    border: 3px solid #333; border-top-color: #ff4d4d;
    border-radius: 50%; animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .result { display: none; margin-top: 24px; }
  .result.show { display: block; }

  .result .player {
    position: relative; width: 100%; aspect-ratio: 16/9; border-radius: 12px;
    overflow: hidden; background: #000;
  }
  .result .player iframe { width: 100%; height: 100%; border: 0; }

  .result .details { margin-top: 20px; }
  .result .details h2 { font-size: 1.2rem; font-weight: 600; line-height: 1.3; }
  .result .details .author { color: #aaa; font-size: 0.9rem; margin-top: 4px; }
  .result .details .links { margin-top: 14px; display: flex; gap: 10px; flex-wrap: wrap; }
  .result .details .links a {
    padding: 7px 18px; border-radius: 20px; font-size: 0.85rem;
    text-decoration: none; font-weight: 500; transition: opacity .2s;
  }
  .result .details .links a:hover { opacity: .8; }
  .result .details .links .watch {
    background: #ff4d4d; color: #fff;
  }
  .result .details .links .youtube {
    background: #333; color: #ccc;
  }

  .placeholder { text-align: center; color: #555; padding: 48px 0; font-size: 0.95rem; }

  .example { text-align: center; margin-top: 16px; font-size: 0.8rem; color: #555; }
  .example a { color: #ff8080; text-decoration: none; }
  .example a:hover { text-decoration: underline; }

  @media (max-width: 640px) {
    .input-box { flex-direction: column; }
    .input-box button { width: 100%; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>ytapis &middot; Video Info</h1>
    <p>YouTube video metadata &mdash; no API key required</p>
  </header>

  <form class="input-box" id="infoForm">
    <input type="text" id="videoInput" placeholder="Video URL or ID&hellip;" required />
    <button type="submit" id="lookupBtn">Lookup</button>
  </form>

  <div class="error-msg" id="errorMsg"></div>
  <div class="example">
    Try: <a href="#" data-example="https://www.youtube.com/watch?v=dQw4w9WgXcQ">dQw4w9WgXcQ</a> &middot;
    <a href="#" data-example="jNQXAC9IVRw">jNQXAC9IVRw</a>
  </div>

  <div class="spinner" id="spinner"></div>

  <div class="result" id="result">
    <div class="player">
      <iframe id="playerFrame" allowfullscreen srcdoc=""></iframe>
    </div>
    <div class="details">
      <h2 id="videoTitle"></h2>
      <div class="author" id="videoAuthor"></div>
      <div class="links">
        <a class="watch" id="watchLink" href="#" target="_blank" rel="noopener">Watch on YouTube</a>
        <a class="youtube" id="thumbLink" href="#" target="_blank" rel="noopener">Download Thumbnail</a>
      </div>
    </div>
  </div>

  <div class="placeholder" id="placeholder">Enter a YouTube video URL or ID above</div>
</div>

<script>
  const form = document.getElementById('infoForm');
  const input = document.getElementById('videoInput');
  const btn = document.getElementById('lookupBtn');
  const spinner = document.getElementById('spinner');
  const errorMsg = document.getElementById('errorMsg');
  const result = document.getElementById('result');
  const placeholder = document.getElementById('placeholder');
  const playerFrame = document.getElementById('playerFrame');
  const videoTitle = document.getElementById('videoTitle');
  const videoAuthor = document.getElementById('videoAuthor');
  const watchLink = document.getElementById('watchLink');
  const thumbLink = document.getElementById('thumbLink');

  function extractId(str) {
    str = str.trim();
    if (/^[A-Za-z0-9_-]{11}$/.test(str)) return str;
    const m = str.match(/(?:v=|youtu\.be\/|\/v\/|\/embed\/)([A-Za-z0-9_-]{11})/);
    return m ? m[1] : null;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const id = extractId(input.value);
    if (!id) {
      errorMsg.textContent = 'Could not extract a valid video ID from that input.';
      return;
    }

    errorMsg.textContent = '';
    placeholder.style.display = 'none';
    result.classList.remove('show');
    spinner.classList.add('show');
    btn.disabled = true;

    try {
      const oembed = `https://www.youtube.com/oembed?url=${encodeURIComponent('https://www.youtube.com/watch?v=' + id)}&format=json`;
      const res = await fetch(oembed);
      if (!res.ok) throw new Error(`oEmbed returned ${res.status}`);
      const data = await res.json();

      videoTitle.textContent = data.title || 'Unknown';
      videoAuthor.textContent = data.author_name || 'Unknown';
      watchLink.href = `https://www.youtube.com/watch?v=${id}`;
      thumbLink.href = `https://i.ytimg.com/vi/${id}/maxresdefault.jpg`;

      playerFrame.srcdoc = `<style>body{margin:0;background:#000;display:flex;align-items:center;justify-content:center;height:100%}.ytp-error{color:#fff}</style>
        <iframe width="100%" height="100%" src="https://www.youtube.com/embed/${id}?rel=0&autoplay=1" allow="autoplay; encrypted-media" allowfullscreen style="border:0"></iframe>`;

      result.classList.add('show');

      try {
        const thumbRes = await fetch(thumbLink.href, { method: 'HEAD' });
        if (!thumbRes.ok) thumbLink.href = `https://i.ytimg.com/vi/${id}/hqdefault.jpg`;
      } catch {}
    } catch (err) {
      errorMsg.textContent = err.message;
      placeholder.textContent = 'Could not load video info. Check the ID and try again.';
      placeholder.style.display = 'block';
    } finally {
      spinner.classList.remove('show');
      btn.disabled = false;
    }
  });

  document.querySelectorAll('[data-example]').forEach(a => {
    a.addEventListener('click', e => {
      e.preventDefault();
      input.value = a.dataset.example;
      form.dispatchEvent(new Event('submit'));
    });
  });
</script>
</body>
</html>
