<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ytapis &ndash; YouTube Search</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f0f0f; color: #eee; min-height: 100vh;
  }
  .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }

  header { text-align: center; margin-bottom: 32px; }
  header h1 {
    font-size: 2rem; font-weight: 700; letter-spacing: -0.02em;
    background: linear-gradient(135deg, #ff4d4d, #f9f9f9);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  header p { color: #888; margin-top: 4px; font-size: 0.9rem; }

  .search-box {
    display: flex; gap: 8px; max-width: 600px; margin: 0 auto;
  }
  .search-box input {
    flex: 1; padding: 12px 16px; border: 1px solid #333; border-radius: 24px;
    background: #1a1a1a; color: #eee; font-size: 1rem; outline: none;
    transition: border .2s;
  }
  .search-box input:focus { border-color: #ff4d4d; }
  .search-box button {
    padding: 12px 28px; border: none; border-radius: 24px;
    background: #ff4d4d; color: #fff; font-size: 1rem; font-weight: 600;
    cursor: pointer; transition: background .2s;
  }
  .search-box button:hover { background: #e04040; }
  .search-box button:disabled { opacity: .6; cursor: not-allowed; }

  .meta { display: flex; justify-content: space-between; align-items: center; margin: 20px 0 16px; }
  .meta .count { color: #888; font-size: 0.85rem; }
  .meta .error { color: #ff4d4d; font-size: 0.85rem; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }
  .card {
    background: #1a1a1a; border-radius: 12px; overflow: hidden;
    transition: transform .15s, box-shadow .15s;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.4); }
  .card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }
  .card-body { padding: 12px 14px 14px; }
  .card-body h3 {
    font-size: 0.95rem; font-weight: 600; line-height: 1.3;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-body .author { color: #aaa; font-size: 0.8rem; margin-top: 4px; }
  .card-body .links { margin-top: 10px; display: flex; gap: 8px; }
  .card-body .links a {
    padding: 5px 14px; border-radius: 16px; font-size: 0.78rem;
    text-decoration: none; font-weight: 500; transition: opacity .2s;
  }
  .card-body .links a:hover { opacity: .8; }
  .card-body .links .watch {
    background: #ff4d4d; color: #fff;
  }
  .card-body .links .info {
    background: #333; color: #ccc;
  }

  .spinner {
    display: none; justify-content: center; padding: 48px 0;
  }
  .spinner.show { display: flex; }
  .spinner::after {
    content: ''; width: 36px; height: 36px;
    border: 3px solid #333; border-top-color: #ff4d4d;
    border-radius: 50%; animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .placeholder { text-align: center; color: #555; padding: 48px 0; font-size: 0.95rem; }

  @media (max-width: 640px) {
    .grid { grid-template-columns: 1fr; }
    header h1 { font-size: 1.5rem; }
    .search-box { flex-direction: column; }
    .search-box button { width: 100%; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>ytapis &middot; Search</h1>
    <p>YouTube search &mdash; no API key required</p>
  </header>

  <form class="search-box" id="searchForm">
    <input type="text" id="queryInput" placeholder="Search YouTube&hellip;" required autofocus />
    <button type="submit" id="searchBtn">Search</button>
  </form>

  <div class="meta">
    <span class="count" id="resultCount"></span>
    <span class="error" id="errorMsg"></span>
  </div>

  <div class="spinner" id="spinner"></div>
  <div class="grid" id="results"></div>
  <div class="placeholder" id="placeholder">Enter a query above to search YouTube</div>
</div>

<script>
  const API = 'https://ytapis.djalokyt27.workers.dev';
  const form = document.getElementById('searchForm');
  const input = document.getElementById('queryInput');
  const btn = document.getElementById('searchBtn');
  const grid = document.getElementById('results');
  const spinner = document.getElementById('spinner');
  const count = document.getElementById('resultCount');
  const error = document.getElementById('errorMsg');
  const placeholder = document.getElementById('placeholder');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const query = input.value.trim();
    if (!query) return;

    grid.innerHTML = '';
    count.textContent = '';
    error.textContent = '';
    placeholder.style.display = 'none';
    spinner.classList.add('show');
    btn.disabled = true;

    try {
      const res = await fetch(`${API}/?q=${encodeURIComponent(query)}&limit=12`);
      if (!res.ok) throw new Error(`API returned ${res.status}`);
      const data = await res.json();

      if (!data.length) {
        placeholder.textContent = 'No results found.';
        placeholder.style.display = 'block';
      } else {
        count.textContent = `${data.length} result${data.length !== 1 ? 's' : ''}`;
        data.forEach(v => {
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
            <img src="${v.thumbnail}" alt="${v.title}" loading="lazy" onerror="this.src='https://i.ytimg.com/vi/${v.id}/hqdefault.jpg'" />
            <div class="card-body">
              <h3 title="${v.title.replace(/"/g, '&quot;')}">${v.title}</h3>
              <div class="author">${v.author}</div>
              <div class="links">
                <a class="watch" href="${v.fullUrl}" target="_blank" rel="noopener">Watch</a>
                <a class="info" href="/video-info/?id=${v.id}" target="_blank">Info</a>
              </div>
            </div>
          `;
          grid.appendChild(card);
        });
      }
    } catch (err) {
      error.textContent = err.message;
      placeholder.textContent = 'Something went wrong.';
      placeholder.style.display = 'block';
    } finally {
      spinner.classList.remove('show');
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
